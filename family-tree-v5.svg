<circle cx="500" cy="500" r="90" fill="#ead39b" stroke="#6c3d20" stroke-width="6"/><text x="500" y="488" text-anchor="middle" font-family="Georgia,serif" font-size="30" font-weight="700" fill="#2b190f">PRESENT</text><text x="500" y="528" text-anchor="middle" font-family="Georgia,serif" font-size="30" font-weight="700" fill="#2b190f">DAY</text>
