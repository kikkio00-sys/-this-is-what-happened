<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 1000" role="img" aria-labelledby="title desc">
<title id="title">Four-family generation tree</title><desc id="desc">A crisp tree-ring exhibit divided into Blackwell, Zahner, Downing, and Barrett sections around Present Day.</desc>
<defs>
 <radialGradient id="wood" cx="48%" cy="46%"><stop offset="0" stop-color="#e7c883"/><stop offset=".45" stop-color="#c99a53"/><stop offset=".82" stop-color="#a56c34"/><stop offset="1" stop-color="#6e3b20"/></radialGradient>
 <filter id="shadow"><feDropShadow dx="0" dy="12" stdDeviation="12" flood-opacity=".35"/></filter>
 <pattern id="grain" width="12" height="12" patternUnits="userSpaceOnUse"><path d="M0 6 Q3 2 6 6T12 6" fill="none" stroke="#6f3d20" stroke-opacity=".18" stroke-width="1"/></pattern>
</defs>
<g filter="url(#shadow)"><circle cx="500" cy="500" r="435" fill="url(#wood)" stroke="#4c2817" stroke-width="28"/><circle cx="500" cy="500" r="425" fill="url(#grain)"/></g>
